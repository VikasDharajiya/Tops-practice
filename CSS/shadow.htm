<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box{
        height: 200px;
        width: 200px;
        border: 2px solid red;
        padding: 20px;
        color: rgb(12, 13, 13);
        /* background-color: lightsalmon; */
        box-shadow: 20px 20px 10px rebeccapurple;
        
      }
      p{
        text-shadow: 10px 10px 3px gray;
        /* letter-spacing: 10px; */
        word-spacing: 5px;
      }
      p::before{
        content:'\2605';
      }
      p::after{
        content: '\0026';
      }
    </style>
  </head>
  <body>
    
      <div class="box">
        <p>
          Lorem ipsum dolor sit amet consectetur adipisicing elit. Optio,
          quaerat!
        </p>
      </div>
   
  </body>
</html>
