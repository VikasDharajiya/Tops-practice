<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // if else
      let a = 98;
      let b = 230;
      if (a > b) {
        document.write("a is max");
      } else {
        document.write("b is max");
      }

      // nested
      let no = -90;
      if (no > 0) {
        document.write("<br> positive no");
      } else if ((no == 0)) {
        document.write("<br> zero");
      } else {
        document.write("<br> negative no");
      }
    </script>
  </body>
</html>
