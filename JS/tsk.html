<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let no = parseInt(prompt("enter a number"));
      let original = no;

      let sum = 0;
      let temp = no;

      while (temp > 0) {
        let digit = temp % 10;
        sum += digit;
        temp = Math.floor(temp / 10);
      }

      let rev = 0;
      let s = sum;

      while (s > 0) {
        let digit = s % 10;
        rev = rev * 10 + digit;
        s = Math.floor(s / 10);
      }

      let mul = rev * sum;

      document.write("<br>Original Number: " + original);
      document.write("<br>Sum of digits: " + sum);
      document.write("<br>Reverse of Sum: " + rev);
      document.write("<br>Multiply: " + mul);

      if (mul === original) {
        document.write("<br>It is a Magic Number");
      } else {
        document.write("<br>It is NOT a Magic Number");
      }
    </script>
  </body>
</html>
