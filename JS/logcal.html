<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // logical opr &&(and), ||(or), !(not)
      let a = 34;
      let b = 200;
      let c = 27;
      document.write("<br> a>b and a>c is" + (a > b && a > c));
      document.write("<br> a>b or a>c is" + (a > b || a > c));
      document.write("<br> a>b is" + (a > b));
      document.write("<br> !a>b is" + !(a > b));

      //typof
      document.write("<br>" + typeof 10);
      document.write("<br>" + typeof 10.5);
      document.write("<br>" + typeof "T");
      document.write("<br>" + typeof "vik");
      document.write("<br>" + typeof true);
      let x;
      document.write("<br>" + typeof x);
      x = [];
      document.write("<br>" + typeof x);
      x = {};
      document.write("<br>" + typeof x);
    </script>
  </body>
</html>
