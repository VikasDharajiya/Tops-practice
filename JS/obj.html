<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let obj = {
        // name: xyz,
        id: 102,
        age: 22,
        salary: 2344,
      };
      obj.lastname = "dharajiya"; // insert
      for (let x in obj) {
        document.write("<br>" + x + " is " + obj[x]);
      }
      document.write("<br> <hr>");

      delete obj.lastname;
      for (let x in obj) {
        document.write("<br>" + x + " is " + obj[x]);
      }
      document.write("<br> <hr>");
    </script>
  </body>
</html>
