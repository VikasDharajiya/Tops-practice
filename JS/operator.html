<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // arithmatic opr +,-,*,/ %(modulas), ++,--,**
      // let a = parseInt(prompt("enter a:"));
      // let b = parseInt(prompt("enter b:"));
      // document.write('addition is'+(a+b))

      // ++
      let x = 20;
      document.write("x is" + x);
      b = x++; // postfix, old value , first assign value and then add 1
      document.write(" <br> x is" + x);
      document.write(" <br> x is" + b);

      ++x; // prefix, new value, first add 1 then assign
      b = ++x;
      document.write(" <br>x is" + x);
      document.write(" <br> x is" + b);
    </script>
  </body>
</html>
