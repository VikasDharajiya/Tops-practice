<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let day = 6;
      switch (day) {
        case 1:
          console.log("Monday");
          break;
        case 2:
          console.log("Tuesday");
          break;
        case 3:
          console.log("Wednesday");
          break;
        case 4:
          console.log("Thursday");
          break;
        case 5:
          console.log("Friday");
          break;
        case 6:
          console.log("Saturday");
          break;
        case 7:
          console.log("Sunday");
          break;
        default:
          console.log("Invalid day");
      }

      let age = 35;
      let result = age >= 18 ? "adult" : "not";
      console.log(result);

      //
      let role = "admin";

      switch (role) {
        case "admin":
          console.log("Full access");
          break;
        case "editor":
          console.log("Edit access");
          break;
        case "user":
          console.log("View only");
          break;
        default:
          console.log("No access");
      }

      let marks = 68;
      let res = marks >= 50 ? "pass" : "fail";
      console.log(res);
    </script>
  </body>
</html>
