<div
  class="h-screen flex items-center justify-center bg-gradient-to-tr from-indigo-400 via-purple-500 to-pink-500 relative overflow-hidden"
>
  <!-- Animated floating gradient circles -->
  <div
    class="absolute w-96 h-96 bg-indigo-400 rounded-full opacity-30 top-[-10%] left-[-10%] animate-pulse-slow"
  ></div>
  <div
    class="absolute w-80 h-80 bg-pink-500 rounded-full opacity-20 bottom-[-10%] right-[-5%] animate-pulse-slow"
  ></div>

  <!-- Dark/Light toggle top-right -->
  <p-button
    (click)="toggleDarkMode()"
    class="absolute top-5 right-5 flex items-center gap-2 px-4 py-2 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200 transition-colors duration-300 shadow-lg hover:scale-110 transform"
  >
    <i
      class="pi transition-transform duration-500"
      [ngClass]="isDarkMode ? 'pi-sun rotate-180 scale-125' : 'pi-moon rotate-0 scale-100'"
    ></i>
  </p-button>

  <div
    class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl p-10 w-full max-w-md transition-all duration-500 transform hover:scale-105 hover:shadow-3xl motion-safe:animate-fadeInUp relative z-10"
  >
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <img src="assets/logo.svg" alt="Logo" class="w-16 h-16" />
    </div>

    <!-- Heading -->
    <h2 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-8 text-center">
      Welcome Back
    </h2>

    <!-- Email Input -->
    <input
      pInputText
      placeholder="Email"
      class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition-colors duration-300 mb-4 shadow-sm"
    />
    <input
      placeholder="password"
      class="w-1/2 px-5 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition-colors duration-300 mb-4 shadow-sm"
    />

    <!-- Password Input -->
    <!-- <p-password
      placeholder="Password"
      feedback="false"
      inputId="password"
      class="w-full px-5 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition-colors duration-300 mb-6 shadow-sm"
    ></p-password> -->

    <!-- Login Button -->
    <p-button
      label="Login"
      class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold px-6 py-3 rounded-2xl transition-colors duration-300 shadow-lg hover:shadow-2xl mb-4 motion-safe:animate-bounceHover"
    ></p-button>

    <!-- Or separator -->
    <div class="flex items-center my-4">
      <hr class="flex-grow border-gray-300 dark:border-gray-600" />
      <span class="px-2 text-gray-500 dark:text-gray-400 text-sm">or</span>
      <hr class="flex-grow border-gray-300 dark:border-gray-600" />
    </div>

    <!-- Social Login Buttons -->
    <p-button
      label="Login with Google"
      class="flex items-center justify-center gap-2 w-full bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-2xl shadow transition-all duration-300 mb-3 hover:scale-105"
    >
      <i class="mr-2 pi pi-google"></i>
    </p-button>
    <p-button
      label="Login with GitHub"
      class="flex items-center justify-center gap-2 w-full bg-gray-800 dark:bg-gray-700 hover:bg-gray-900 text-white px-4 py-2 rounded-2xl shadow transition-all duration-300 hover:scale-105"
    >
      <i class="mr-2 pi pi-github"></i>
    </p-button>

    <!-- Footer -->
    <p class="mt-6 text-center text-gray-500 dark:text-gray-400 text-sm">
      Don't have an account?
      <a href="#" class="text-indigo-600 dark:text-indigo-400 hover:underline">Sign up</a>
    </p>
  </div>
</div>
