<div
  class="h-screen bg-gray-100 dark:bg-slate-900 transition-all duration-700 ease-in-out flex"
  [ngClass]="isLogin ? 'flex-row' : 'flex-row-reverse'"
>
  <button
    (click)="toggleDarkMode()"
    class="absolute top-5 right-5 flex items-center gap-2 px-4 py-2 rounded-xl bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-gray-800 dark:text-gray-200 transition-all duration-300 shadow-md hover:shadow-xl hover:scale-105"
  >
    <i
      class="pi transition-all duration-500"
      [ngClass]="isDarkMode ? 'pi-sun rotate-180 text-yellow-400' : 'pi-moon text-indigo-600'"
    ></i>
  </button>
  <div
    class="hidden md:flex w-1/2 items-center h-full transition-transform ease-in-out duration-700"
  >
    <img
      class="w-[90%] h-full drop-shadow-2xl object-cover object-left rounded-r-3xl"
      src="assets/imgs/left-bg.png"
      alt=""
    />
  </div>
  <div
    class="w-full md:w-1/2 h-full flex items-center justify-center bg-gray-100 dark:bg-slate-900 transition-all duration-700"
  >
    <div
      class="relative bg-white dark:bg-slate-800 w-full max-w-md p-10 rounded-3xl shadow-2xl border border-gray-200 dark:border-slate-700 transition-colors duration-300"
    >
      <!-- Logo -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-600">LoGo</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-2">
          {{ isLogin ? ' Welcome back! Please login to your account' : 'Create new account' }}
        </p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="mb-4">
          <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
            Email
          </label>
          <input
            type="email"
            formControlName="email"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition"
          />

          <div class="text-red-500 text-sm mt-1" *ngIf="f.email.touched && f.email.invalid">
            <span *ngIf="f.email.errors?.['required']"> Email is required. </span>
            <span *ngIf="f.email.errors?.['email']"> Invalid email format. </span>
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">
            Password
          </label>
          <input
            type="password"
            formControlName="password"
            class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:focus:ring-indigo-400 transition"
          />

          <div class="text-red-500 text-sm mt-1" *ngIf="f.password.touched && f.password.invalid">
            <span *ngIf="f.password.errors?.['required']"> Password is required. </span>
            <span *ngIf="f.password.errors?.['minlength']"> Minimum 6 characters. </span>
          </div>
        </div>

        <!-- Remember  -->
        <div class="flex items-center justify-between mb-6 text-sm">
          <label class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
            <input type="checkbox" class="rounded cursor-pointer" />
            Remember me
          </label>

          <a href="#" class="text-indigo-600 hover:underline"> Forgot password? </a>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ isLogin ? 'Login' : 'Sign Up' }}
        </button>

        <!-- Signup -->
        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
          {{ isLogin ? "Don't have an account?" : ' Have an account?' }}
          <span (click)="isLogin = !isLogin" class="text-indigo-600 cursor-pointer hover:underline">
            {{ isLogin ? 'Create' : 'Login' }}
          </span>
        </p>
      </form>
    </div>
  </div>
</div>
