<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
  <!-- Add New Task -->
  <div class="flex gap-2 mb-4">
    <input
      type="text"
      class="flex-1 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      placeholder="Add new task..."
      [(ngModel)]="newTaskName"
    />
    <button
      [disabled]="!newTaskName"
      (click)="addTask()"
      class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:cursor-not-allowed transition"
    >
      Add
    </button>
  </div>

  <!-- Task List -->
  <ul class="divide-y divide-gray-200">
    <li *ngFor="let task of tasks" class="flex items-center justify-between py-2">
      <div class="flex items-center gap-2">
        <!-- Checkbox -->
        <input
          type="checkbox"
          [checked]="task.completed"
          (change)="toggleTaskCompleted(task)"
          class="mr-2 w-5 h-5 text-blue-500 border-gray-300 rounded focus:ring-2 focus:ring-blue-400"
        />
        <input
          *ngIf="editingId === task.id"
          type="text"
          [(ngModel)]="editingName"
          class="border p-1 rounded flex-1"
        />
        <span
          *ngIf="editingId !== task.id"
          class="text-lg font-light"
          [class.line-through]="task.completed"
        >
          {{ task.name }}
        </span>
      </div>

      <!-- Task Title / Edit Input -->
      <div class="flex items-center gap-2">
        <button
          *ngIf="editingId === task.id"
          (click)="saveEdit(task)"
          [disabled]="editingName.trim() === '' || editingName === task.name"
          class="bg-green-500 hover:bg-green-600 disabled:bg-green-300 disabled:cursor-not-allowed text-white px-2 py-1 rounded text-sm"
        >
          Save
        </button>
        <button
          *ngIf="editingId === task.id"
          (click)="cancleEdit()"
          class="bg-gray-400 hover:bg-gray-500 text-white px-2 py-1 rounded text-sm"
        >
          Cancel
        </button>

        <button
          *ngIf="editingId !== task.id"
          (click)="startEdit(task)"
          class="px-2 py-1 bg-yellow-500 text-white rounded-md hover:bg-yellow-400 transition"
        >
          Edit
        </button>
        <button
          *ngIf="editingId !== task.id"
          (click)="deleteTask(task.id)"
          class="px-2 py-1 bg-red-600 text-white rounded-md hover:bg-red-500 transition"
        >
          Delete
        </button>
      </div>

      <!-- Edit / Delete Buttons -->
    </li>
  </ul>
</div>
