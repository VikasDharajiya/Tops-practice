<p-toast></p-toast>
<div class="flex items-center justify-center min-h-screen bg-gray-900 px-4">
  <div
    class="bg-white/10 backdrop-blur-lg border border-white/20 shadow-2xl rounded-3xl max-w-md w-full p-10 login-card"
  >
    <div class="flex justify-center mb-6">
      <div class="text-4xl font-bold text-white">Admin</div>
    </div>

    <h2 class="text-center text-xl font-semibold text-white/90 mb-8">Sign in to your dashboard</h2>

    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username"
      class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/5 text-white placeholder-white/60 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 mb-5 outline-none transition"
    />
    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      class="w-full px-4 py-3 rounded-xl border border-white/30 bg-white/5 text-white placeholder-white/60 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 mb-6 outline-none transition"
    />

    <button
      class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-semibold shadow-lg transition-all"
      (click)="login()"
    >
      Sign In
    </button>

    <!-- <p class="text-center text-white/50 text-sm mt-4 hover:text-white cursor-pointer">
      Forgot password?
    </p> -->
    <p class="text-center text-gray-500 mt-4 text-sm">
      Enter admin credentials to access the panel
    </p>
  </div>
</div>
