<div class="p-6 bg-slate-950 min-h-full text-white">
  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-2xl font-semibold">Dashboard Overview</h1>
      <p class="text-slate-400 text-sm">Monitor your platform performance</p>
    </div>

    <div class="flex items-center gap-3">
      <button pButton label="Generate Report" icon="pi pi-download" class="p-button-sm"></button>
    </div>
  </div>
  <div class="grid grid-cols-4 gap-6 mb-8">
    <!-- Users -->
    <div
      class="bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-purple-600 transition"
    >
      <div class="flex justify-between items-start">
        <div>
          <p class="text-slate-400 text-sm">Total Users</p>
          <h3 class="text-3xl font-bold mt-2">1,250</h3>
          <p class="text-green-400 text-xs mt-1">+12% this month</p>
        </div>
        <div class="bg-purple-600/20 p-3 rounded-lg">
          <i class="pi pi-users text-purple-500 text-xl"></i>
        </div>
      </div>
    </div>

    <!-- Revenue -->
    <div
      class="bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-green-500 transition"
    >
      <div class="flex justify-between items-start">
        <div>
          <p class="text-slate-400 text-sm">Revenue</p>
          <h3 class="text-3xl font-bold mt-2">$12,400</h3>
          <p class="text-green-400 text-xs mt-1">+8.4%</p>
        </div>
        <div class="bg-green-600/20 p-3 rounded-lg">
          <i class="pi pi-dollar text-green-400 text-xl"></i>
        </div>
      </div>
    </div>

    <!-- Orders -->
    <div
      class="bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-blue-500 transition"
    >
      <div class="flex justify-between items-start">
        <div>
          <p class="text-slate-400 text-sm">Orders</p>
          <h3 class="text-3xl font-bold mt-2">320</h3>
          <p class="text-red-400 text-xs mt-1">-3.2%</p>
        </div>
        <div class="bg-blue-600/20 p-3 rounded-lg">
          <i class="pi pi-shopping-cart text-blue-400 text-xl"></i>
        </div>
      </div>
    </div>

    <!-- Conversion -->
    <div
      class="bg-slate-900 border border-slate-800 rounded-xl p-5 hover:border-pink-500 transition"
    >
      <div class="flex justify-between items-start">
        <div>
          <p class="text-slate-400 text-sm">Conversion</p>
          <h3 class="text-3xl font-bold mt-2">4.8%</h3>
          <p class="text-green-400 text-xs mt-1">+1.1%</p>
        </div>
        <div class="bg-pink-600/20 p-3 rounded-lg">
          <i class="pi pi-chart-line text-pink-400 text-xl"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-6 mb-8">
    <!-- Revenue Chart -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <h2 class="text-lg font-semibold mb-4">Revenue Trend</h2>
      <p-chart type="line" [data]="lineChartData" [options]="chartOptions"></p-chart>
    </div>

    <!-- Traffic Chart -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <h2 class="text-lg font-semibold mb-4">Traffic Sources</h2>
      <p-chart type="bar" [data]="barChartData" [options]="chartOptions"></p-chart>
    </div>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
    <h2 class="text-lg font-semibold mb-4">Recent Users</h2>
    <!-- <button (click)="fetchUsers()">Load Users</button> -->

    <p-table *ngIf="users$ | async as users" [value]="users" styleClass="p-datatable-md">
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span
              class="px-2 py-1 text-xs rounded"
              [ngClass]="{
                'bg-green-600 text-white': user.status === 'Active',
                'bg-red-600 text-white': user.status === 'Inactive',
              }"
            >
              {{ user.status }}
            </span>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
