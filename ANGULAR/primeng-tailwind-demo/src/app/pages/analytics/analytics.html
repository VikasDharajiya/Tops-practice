<div class="p-6 bg-slate-950 min-h-full text-white">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-semibold">Analytics</h1>
    <p class="text-slate-400 text-sm">Detailed performance insights</p>
  </div>

  <!-- KPI Row -->
  <div class="grid grid-cols-4 gap-6 mb-8">
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <p class="text-slate-400 text-sm">Page Views</p>
      <h3 class="text-3xl font-bold mt-2">45,320</h3>
      <p class="text-green-400 text-xs mt-1">+15%</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <p class="text-slate-400 text-sm">Bounce Rate</p>
      <h3 class="text-3xl font-bold mt-2">32%</h3>
      <p class="text-red-400 text-xs mt-1">-2.1%</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <p class="text-slate-400 text-sm">New Users</p>
      <h3 class="text-3xl font-bold mt-2">1,240</h3>
      <p class="text-green-400 text-xs mt-1">+8.4%</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-5">
      <p class="text-slate-400 text-sm">Sessions</p>
      <h3 class="text-3xl font-bold mt-2">12,890</h3>
      <p class="text-green-400 text-xs mt-1">+3.7%</p>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="grid md:grid-cols-2 gap-6 mb-8">
    <!-- Revenue Line Chart -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
      <h2 class="text-lg font-semibold mb-4">Revenue Growth</h2>
      <p-chart type="line" [data]="lineChartData" [options]="chartOptions"></p-chart>
    </div>

    <!-- Traffic Donut -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
      <h2 class="text-lg font-semibold mb-4">Traffic Sources</h2>
      <p-chart type="doughnut" [data]="donutData" [options]="chartOptions"></p-chart>
    </div>
  </div>

  <!-- Top Products Table -->
  <div class="bg-slate-900 border border-slate-800 rounded-xl p-6">
    <h2 class="text-lg font-semibold mb-4">Top Performing Products</h2>

    <p-table [value]="products" styleClass="p-datatable-sm">
      <ng-template pTemplate="header">
        <tr>
          <th>Product</th>
          <th>Sales</th>
          <th>Revenue</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-product>
        <tr>
          <td>{{ product.name }}</td>
          <td>{{ product.sales }}</td>
          <td class="text-green-400">${{ product.revenue }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
