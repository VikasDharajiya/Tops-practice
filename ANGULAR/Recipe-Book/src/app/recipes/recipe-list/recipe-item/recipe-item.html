<div
  class="flex justify-between items-center p-4 border border-gray-300 rounded-xl cursor-pointer hover:bg-gray-100 hover:shadow-lg transition-all duration-200 hover:scale-[1.02]"
  (click)="onSelect()"
>
  <div class="flex gap-4">
    <img
      [src]="recipe.imagePath"
      [alt]="recipe.name"
      class="w-32 h-24 object-cover rounded-lg shrink-0"
    />

    <div class="flex flex-col justify-center">
      <h3 class="text-lg font-semibold text-gray-900">
        {{ recipe.name }}
      </h3>

      <p class="text-sm text-gray-600 mt-1 line-clamp-2">
        {{ recipe.description }}
      </p>
    </div>
  </div>
  <div>
    <p-button
      icon="pi pi-trash"
      (onClick)="onDelete(); $event.stopPropagation()"
      variant="text"
      [raised]="true"
      severity="danger"
    >
    </p-button>
  </div>
</div>
