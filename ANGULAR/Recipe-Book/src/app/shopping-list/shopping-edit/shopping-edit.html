<div class="mx-auto p-4 bg-gray-100 shadow-md rounded-lg space-y-4">
  <!-- Title -->
  <h2 class="text-xl font-semibold text-gray-800 text-center">Manage Ingredient</h2>

  <!-- Input fields -->
  <div class="space-y-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input
        type="text"
        [(ngModel)]="name"
        placeholder="e.g. Tomato"
        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring focus:ring-green-300"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
      <input
        type="number"
        [(ngModel)]="amount"
        placeholder="e.g. 2"
        class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring focus:ring-green-300"
      />
    </div>
  </div>

  <!-- Action buttons -->
  <div class="flex gap-3 mt-2">
    <p-button
      label="{{ editIndex >= 0 ? 'Update' : 'Add' }}"
      (click)="onAddOrUpdate()"
      [disabled]=""
      [raised]="true"
      severity="success"
      class=""
    ></p-button>

    <p-button
      label="Clear"
      (click)="onClear()"
      [raised]="true"
      severity="secondary"
      class=""
    ></p-button>
  </div>
</div>
