<p-menubar [model]="items" class="shadow-md">
  <ng-template pTemplate="start">
    <span
      class="text-2xl font-bold tracking-wide cursor-pointer text-gray-700 hover:text-gray-500 mr-6"
    >
      RecipeBook
    </span>
  </ng-template>

  <ng-template pTemplate="end">
    <p-button label="Manage" icon="pi pi-cog" severity="secondary"> </p-button>
  </ng-template>
</p-menubar>
